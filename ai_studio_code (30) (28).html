<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCOS V5 | Jurex Admin Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #a29bfe; --secondary: #6c5ce7; --bg: #0b091a;
            --glass: rgba(255, 255, 255, 0.05); --glass-heavy: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1); --text: #ffffff;
            --msg-me: #6c5ce7; --msg-them: #2d3436; --danger: #ff7675; --verify: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth Wall */
        #authWall { position: fixed; inset: 0; background: radial-gradient(circle at top right, #302b63, #0f0c29); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { background: var(--glass); backdrop-filter: blur(25px); padding: 40px; border-radius: 30px; border: 1px solid var(--border); width: 90%; max-width: 420px; text-align: center; }
        .auth-card input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: white; outline: none; }
        
        .btn { padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-p { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; width: 100%; }
        .btn-s { background: transparent; color: white; border: 1px solid var(--border); width: 100%; }

        /* UI Structure */
        #app { display: none; flex-direction: column; height: 100vh; }
        header { height: 70px; background: rgba(0,0,0,0.6); display: flex; align-items: center; padding: 0 25px; border-bottom: 1px solid var(--border); justify-content: space-between; backdrop-filter: blur(10px); }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        nav.sidebar { width: 280px; background: rgba(11, 9, 26, 0.98); border-right: 1px solid var(--border); transition: 0.4s; padding-top: 20px; }

        main { flex: 1; overflow-y: auto; background: radial-gradient(circle at bottom left, #1a1a2e, #0b091a); padding-bottom: 50px;}
        .page { display: none; padding: 20px; max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s; }
        .page.active { display: block; }

        /* Presence & Badges */
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; border: 2px solid var(--bg); position: absolute; bottom: 0; right: 0; }
        .online { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        .offline { background: #95a5a6; }
        .v-badge { color: var(--verify); font-size: 0.8rem; margin-left: 4px; }

        /* Cards & Chat */
        .post-card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); position: relative; }
        .broadcast-card { border: 1px solid #f1c40f; background: rgba(241, 196, 15, 0.05); }
        .avatar-wrap { position: relative; width: 45px; height: 45px; cursor: pointer; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #333; }
        
        .chat-window { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding: 10px; }
        .chat-row { display: flex; gap: 10px; max-width: 85%; position: relative; }
        .chat-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 12px 18px; border-radius: 18px; font-size: 0.9rem; position: relative; }
        .chat-row.me .bubble { background: var(--msg-me); border-bottom-right-radius: 4px; }
        .chat-row.them .bubble { background: var(--glass-heavy); border-bottom-left-radius: 4px; }

        /* Reactions */
        .react-btn { font-size: 0.7rem; opacity: 0.5; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        .react-btn:hover { opacity: 1; color: var(--danger); }
        .react-count { font-size: 0.75rem; background: var(--glass-heavy); padding: 2px 6px; border-radius: 10px; position: absolute; bottom: -10px; right: 10px; }

        /* DM List */
        .dm-container { display: grid; grid-template-columns: 250px 1fr; gap: 20px; height: 75vh; }
        .dm-list { background: var(--glass); border-radius: 15px; padding: 10px; overflow-y: auto; }
        .dm-contact { padding: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .dm-contact:hover, .dm-contact.active { background: var(--glass-heavy); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="authWall">
        <div class="auth-card">
            <h1 style="color:var(--primary); margin-bottom:10px;">GCOS V5</h1>
            <p id="statusMsg" style="opacity: 0.6; font-size: 0.8rem; margin-bottom: 15px;">Initializing Secure Protocols...</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn btn-p" onclick="handleAuth('signin')">Sign In</button>
            <button class="btn btn-s" style="margin-top:10px" onclick="handleAuth('signup')">Create Account</button>
            <p id="authError" style="color: var(--danger); margin-top: 15px; font-size: 0.8rem;"></p>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="display:flex; align-items:center; gap:15px;">
                <h2 style="color:var(--primary)">GCOS <small style="font-size: 0.5em; opacity: 0.5;">V5 Jurex Edition</small></h2>
            </div>
            <div id="userHead" style="display:flex; align-items:center; gap:12px;">
                <span id="myName"></span>
                <div class="avatar-wrap">
                    <img src="" id="myAvatar" class="avatar">
                    <div class="status-dot online"></div>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <nav class="sidebar">
                <div class="nav-item active" onclick="showPage('home')"><i class="fas fa-home"></i> Home</div>
                <div class="nav-item" onclick="showPage('chat')"><i class="fas fa-globe"></i> Global</div>
                <div class="nav-item" onclick="showPage('dmPage')"><i class="fas fa-comment-dots"></i> DMs</div>
                <div class="nav-item" onclick="showPage('profile')"><i class="fas fa-cog"></i> Profile</div>
                <div class="nav-item" id="adminNav" style="display:none; color:#f1c40f" onclick="showPage('admin')"><i class="fas fa-shield-alt"></i> Admin</div>
                <button class="btn btn-s" onclick="logout()" style="position:absolute; bottom:20px; width:240px; margin:0 20px;"><i class="fas fa-power-off"></i> Logout</button>
            </nav>

            <main>
                <!-- Home Feed -->
                <section id="home" class="page active">
                    <div id="broadcastArea"></div>
                    <div id="adminPostTool" style="display:none;" class="post-card broadcast-card">
                        <p style="color:#f1c40f; font-size:0.7rem; margin-bottom:5px;">ADMIN BROADCAST TOOL</p>
                        <textarea id="bcInput" style="width:100%; background:transparent; border:none; color:white; outline:none;" placeholder="Emergency Announcement..."></textarea>
                        <button class="btn btn-p" style="background:#f1c40f; color:black;" onclick="sendBroadcast()">Broadcast to All</button>
                    </div>

                    <div class="post-card">
                        <textarea id="postInput" style="width:100%; height:60px; background:transparent; border:none; color:white; outline:none; resize:none;" placeholder="Post something to the network..."></textarea>
                        <button class="btn btn-p" style="width:auto; float:right;" onclick="createPost()">Post</button>
                        <div style="clear:both;"></div>
                    </div>
                    <div id="feed"></div>
                </section>

                <!-- Private DMs -->
                <section id="dmPage" class="page">
                    <div class="dm-container">
                        <div class="dm-list" id="dmContactList"></div>
                        <div class="post-card" style="display:flex; flex-direction:column; margin:0;">
                            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:10px;">
                                <div id="dmHeader" style="font-weight:bold; color:var(--primary);">Select User</div>
                                <label style="font-size:0.7rem; display:flex; align-items:center; gap:5px;">
                                    <input type="checkbox" id="vanishToggle"> Vanish Mode
                                </label>
                            </div>
                            <div class="chat-window" id="dmWindow"></div>
                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <input type="text" id="dmInput" style="flex:1; background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 25px; color: white; outline: none;" placeholder="Encrypted DM..." onkeypress="if(event.key==='Enter') sendDM()">
                                <button class="btn btn-p" style="width:50px; border-radius:50%;" onclick="sendDM()"><i class="fas fa-lock"></i></button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Global Chat -->
                <section id="chat" class="page">
                    <div class="post-card">
                        <div class="chat-window" id="chatWindow"></div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <input type="text" id="chatInput" style="flex:1; background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 25px; color: white; outline: none;" placeholder="Global Message..." onkeypress="if(event.key==='Enter') sendChat()">
                            <button class="btn btn-p" style="width:50px; border-radius:50%;" onclick="sendChat()"><i class="fas fa-globe"></i></button>
                        </div>
                    </div>
                </section>

                <!-- Admin Control -->
                <section id="admin" class="page">
                    <h2 style="color:#f1c40f">Network Management</h2>
                    <div class="admin-table-container">
                        <table style="width:100%; margin-top:20px; border-collapse:collapse;">
                            <thead><tr style="text-align:left; opacity:0.5;"><th>User</th><th>Verified</th><th>Action</th></tr></thead>
                            <tbody id="adminUserTable"></tbody>
                        </table>
                    </div>
                </section>

                <!-- Profile Page -->
                <section id="profile" class="page">
                    <div class="post-card" style="text-align:center;">
                        <img src="" id="profAvatar" class="avatar" style="width:100px; height:100px;">
                        <h2 id="profUser"></h2>
                        <input type="text" id="avatarInput" style="width:100%; background:var(--glass); border:1px solid var(--border); padding:10px; margin:10px 0; color:white; border-radius:10px;" placeholder="Avatar URL">
                        <button class="btn btn-p" onclick="updateProfile()">Save Profile</button>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script>
        const ADMIN_ALIAS = "Jurex";
        const ADMIN_PASS = "Jurex143";

        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://peer.wall.org/gun']);
        const user = gun.user().recall({sessionStorage: true});
        let currentDMUser = null;
        let dmSharedSecret = null;

        // 1. Core Auth
        async function handleAuth(type) {
            const alias = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (!alias || !pass) return;

            if (type === 'signup') {
                user.create(alias, pass, (ack) => {
                    if (ack.err) return alert(ack.err);
                    gun.get('gcos_v5_registry').get(alias).put({alias, pass, epub: user._.sea.epub, verified: (alias === ADMIN_ALIAS)});
                    user.auth(alias, pass, () => location.reload());
                });
            } else {
                user.auth(alias, pass, (ack) => {
                    if (ack.err) (alias === ADMIN_ALIAS && pass === ADMIN_PASS) ? handleAuth('signup') : alert(ack.err);
                    else location.reload();
                });
            }
        }

        function logout() { user.leave(); location.reload(); }

        // 2. Presence Heartbeat
        setInterval(() => {
            if (user.is) gun.get('gcos_v5_presence').get(user.is.alias).put(Date.now());
        }, 20000);

        function checkStatus(alias, callback) {
            gun.get('gcos_v5_presence').get(alias).on(time => {
                const isOnline = (Date.now() - time < 40000);
                callback(isOnline);
            });
        }

        // 3. User Session Initialization
        user.get('alias').on(name => {
            if (name) {
                document.getElementById('authWall').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('myName').innerText = name;
                document.getElementById('profUser').innerText = name;
                if (name === ADMIN_ALIAS) {
                    document.getElementById('adminNav').style.display = 'flex';
                    document.getElementById('adminPostTool').style.display = 'block';
                    loadAdminData();
                }
                user.get('avatar').on(url => {
                    const src = url || `https://api.dicebear.com/7.x/initials/svg?seed=${name}`;
                    document.getElementById('myAvatar').src = src;
                    document.getElementById('profAvatar').src = src;
                });
                loadContacts();
            }
        });

        // 4. Reactions & Message Rendering
        function toggleReaction(msgId, container) {
            const myAlias = user.is.alias;
            const ref = gun.get('gcos_v5_reactions').get(msgId).get(myAlias);
            ref.once(val => ref.put(val ? null : '❤️'));
        }

        function renderMessage(containerId, author, text, msgId, vanish = false, time = Date.now()) {
            if (vanish && (Date.now() - time > 3600000)) return; // 1 Hour Vanish Logic

            const win = document.getElementById(containerId);
            if (document.getElementById('m-'+msgId)) return;

            const div = document.createElement('div');
            div.id = 'm-' + msgId;
            div.className = `chat-row ${author === user.is.alias ? 'me' : 'them'}`;
            
            div.innerHTML = `
                <div class="avatar-wrap">
                    <img src="https://api.dicebear.com/7.x/initials/svg?seed=${author}" class="avatar chat-av-${author}" onclick="openDM('${author}')">
                    <div class="status-dot dot-${author} offline"></div>
                </div>
                <div class="bubble">
                    <div style="font-size:0.65rem; opacity:0.7; margin-bottom:4px;">
                        ${author} <span class="v-${author}"></span>
                    </div>
                    ${text}
                    <div class="react-btn" onclick="toggleReaction('${msgId}')"><i class="fas fa-heart"></i></div>
                    <span class="react-count" id="rcnt-${msgId}" style="display:none;"></span>
                    ${vanish ? '<i class="fas fa-clock" style="font-size:0.6rem; opacity:0.4;"></i>' : ''}
                </div>
            `;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;

            // Load verification & status for this message user
            gun.get('gcos_v5_registry').get(author).once(d => {
                if(d?.avatar) document.querySelectorAll('.chat-av-'+author).forEach(img => img.src = d.avatar);
                if(d?.verified) document.querySelectorAll('.v-'+author).forEach(s => s.innerHTML = '<i class="fas fa-check-circle v-badge"></i>');
            });
            checkStatus(author, online => {
                const dot = div.querySelector('.dot-'+author);
                if(dot) dot.className = `status-dot dot-${author} ${online ? 'online' : 'offline'}`;
            });

            // Reactions Listener
            gun.get('gcos_v5_reactions').get(msgId).map().on((emoji, sender) => {
                const countBox = document.getElementById('rcnt-'+msgId);
                let total = 0;
                gun.get('gcos_v5_reactions').get(msgId).once(all => {
                    Object.values(all || {}).forEach(v => { if(v) total++ });
                    if(total > 0) { countBox.innerText = `❤️ ${total}`; countBox.style.display = 'block'; }
                    else countBox.style.display = 'none';
                });
            });
        }

        // 5. Messaging Systems
        async function sendDM() {
            const val = document.getElementById('dmInput').value;
            const vanish = document.getElementById('vanishToggle').checked;
            if (!val || !dmSharedSecret) return;
            const encrypted = await SEA.encrypt(val, dmSharedSecret);
            const path = [user.is.alias, currentDMUser].sort().join('_');
            gun.get('gcos_v5_direct_msgs').get(path).set({
                from: user.is.alias,
                data: encrypted,
                vanish: vanish,
                time: Date.now()
            });
            document.getElementById('dmInput').value = '';
        }

        async function openDM(target) {
            if (target === user.is.alias) return;
            currentDMUser = target;
            showPage('dmPage');
            document.getElementById('dmHeader').innerText = `Direct Chat: ${target}`;
            document.getElementById('dmWindow').innerHTML = '';
            
            gun.get('gcos_v5_registry').get(target).once(async data => {
                dmSharedSecret = await SEA.secret(data.epub, user._.sea);
                const path = [user.is.alias, target].sort().join('_');
                gun.get('gcos_v5_direct_msgs').get(path).map().once(async (msg, id) => {
                    const dec = await SEA.decrypt(msg.data, dmSharedSecret);
                    if (dec) renderMessage('dmWindow', msg.from, dec, id, msg.vanish, msg.time);
                });
            });
        }

        function sendChat() {
            const val = document.getElementById('chatInput').value;
            if (val) gun.get('gcos_v5_global_chat').set({ user: user.is.alias, text: val, time: Date.now() });
            document.getElementById('chatInput').value = '';
        }
        gun.get('gcos_v5_global_chat').map().once((d, id) => { if(d.text) renderMessage('chatWindow', d.user, d.text, id) });

        // 6. Admin Broadcast & Management
        function sendBroadcast() {
            const val = document.getElementById('bcInput').value;
            if (val) gun.get('gcos_v5_broadcast').set({ msg: val, time: Date.now() });
            document.getElementById('bcInput').value = '';
        }

        gun.get('gcos_v5_broadcast').map().once(bc => {
            const div = document.createElement('div');
            div.className = 'post-card broadcast-card';
            div.innerHTML = `<p style="color:#f1c40f; font-weight:bold;"><i class="fas fa-bullhorn"></i> SYSTEM BROADCAST</p><p>${bc.msg}</p>`;
            document.getElementById('broadcastArea').prepend(div);
        });

        function loadAdminData() {
            gun.get('gcos_v5_registry').map().on((data, key) => {
                if (!data || !data.alias) return;
                let row = document.getElementById('arow-' + key);
                if (!row) row = document.getElementById('adminUserTable').insertRow();
                row.id = 'arow-' + key;
                row.innerHTML = `
                    <td style="padding:10px;">${data.alias}</td>
                    <td>${data.verified ? '✅' : '❌'}</td>
                    <td>
                        <button onclick="verifyUser('${key}')" class="btn" style="padding:5px 10px; font-size:0.7rem; background:var(--verify)">Verify</button>
                    </td>
                `;
            });
        }

        function verifyUser(alias) { gun.get('gcos_v5_registry').get(alias).get('verified').put(true); alert(alias + " Verified!"); }

        // 7. General UI
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function loadContacts() {
            gun.get('gcos_v5_registry').map().once((data) => {
                if (!data || data.alias === user.is.alias || document.getElementById('cnt-'+data.alias)) return;
                const div = document.createElement('div');
                div.id = 'cnt-' + data.alias;
                div.className = 'dm-contact';
                div.onclick = () => openDM(data.alias);
                div.innerHTML = `<div class="avatar-wrap"><img src="https://api.dicebear.com/7.x/initials/svg?seed=${data.alias}" class="avatar chat-av-${data.alias}"><div class="status-dot dot-${data.alias} offline"></div></div> ${data.alias}`;
                document.getElementById('dmContactList').appendChild(div);
                checkStatus(data.alias, online => {
                    const dot = div.querySelector('.dot-'+data.alias);
                    if(dot) dot.className = `status-dot dot-${data.alias} ${online ? 'online' : 'offline'}`;
                });
            });
        }

        function createPost() {
            const body = document.getElementById('postInput').value;
            if (body) gun.get('gcos_v5_posts').set({ author: user.is.alias, body, time: Date.now() });
            document.getElementById('postInput').value = '';
        }

        gun.get('gcos_v5_posts').map().once((data, id) => {
            if (!data.body) return;
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                    <div class="avatar-wrap">
                        <img src="https://api.dicebear.com/7.x/initials/svg?seed=${data.author}" class="avatar chat-av-${data.author}" onclick="openDM('${data.author}')">
                        <div class="status-dot dot-${data.author} offline"></div>
                    </div>
                    <span style="font-weight:bold;">${data.author} <span class="v-${data.author}"></span></span>
                </div>
                <div>${data.body}</div>
            `;
            document.getElementById('feed').prepend(card);
            checkStatus(data.author, online => {
                const dot = card.querySelector('.dot-'+data.author);
                if(dot) dot.className = `status-dot dot-${data.author} ${online ? 'online' : 'offline'}`;
            });
        });

        function updateProfile() {
            const url = document.getElementById('avatarInput').value;
            if(url) { user.get('avatar').put(url); alert("Avatar Updated!"); }
        }
    </script>
</body>
</html>
